name: CI

on:
  push:
    branches: [master]
    tags: [v*]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - name: Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: Format
      run: cargo fmt --check
    - name: Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    - name: Build
      run: cargo build --all-features
    - name: Test (no GPU required)
      run: cargo test -p libfse

    - name: PPT Contract Tests (no GPU required)
      # --test-threads=1: the invariant log is a process-global static, so
      # contract tests must not run in parallel (per the PPT framework design).
      run: cargo test -p airframe --test test_contracts -- --test-threads=1

  publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Publish airframe-observe
      working-directory: crates/airframe_observe
      run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
    - name: Publish airframe
      run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
