name: Secret Hygiene

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: secret-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks-working-tree:
    name: Gitleaks (Working Tree)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --config .gitleaks.toml --redact --verbose

  gitleaks-history:
    name: Gitleaks (Git History)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks History Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: git --redact --verbose --config .gitleaks.toml --log-opts="--all"

  secret-policy-audit:
    name: Secret Policy Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit risky secret patterns
        shell: bash
        run: |
          set -euo pipefail

          echo "Auditing workflows for high-risk secret handling patterns..."
          PAT_HITS=$(rg -n "AIRFRAME_ACCESS_TOKEN|x-access-token:\$\{\{\s*secrets\." .github/workflows shimmy_integration/.github/workflows || true)

          if [[ -n "$PAT_HITS" ]]; then
            echo "::warning::Found long-lived token or token-in-URL usage. Migrate to GitHub App token minting or OIDC federation where possible."
            echo "$PAT_HITS"
          else
            echo "No high-risk token patterns found in workflow files."
          fi

      - name: Verify no plaintext secret literals in repo config surfaces
        shell: bash
        run: |
          set -euo pipefail

          HITS=$(rg -n "(ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}|sk_live_[A-Za-z0-9]{16,}|AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z\-_]{35})" \
            .github scripts docs shimmy_integration/.github shimmy_integration/scripts || true)

          if [[ -n "$HITS" ]]; then
            echo "::error::Potential plaintext secret literals found in tracked files."
            echo "$HITS"
            exit 1
          fi

          echo "No plaintext secret literals found in scanned config/script/doc surfaces."
